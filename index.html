<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Burrow</title>
  <style>
    @font-face{
      font-family:"Advercase";
      src:url("fonts/advercase-regular.woff2") format("woff2"),
          url("fonts/advercase-regular.woff") format("woff");
      font-weight:400;font-style:normal;font-display:swap;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%;
      background:#EFEFEF;
      color:#141414;
      font-family:"Advercase", Georgia, serif;
      -webkit-font-smoothing:antialiased;
    }
    body {
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
      padding:8vw;
    }
    h1 {
      font-size:clamp(64px, 16vw, 220px);
      font-weight:400;
      line-height:0.95;
    }
    .sub {
      margin-top:20px;
      font-size:clamp(14px, 1.6vw, 18px);
      font-weight:400;
    }
  </style>
</head>
<body>
  <h1>The&nbsp;Burrow</h1>
  <div class="sub">Coming soon</div>
</body>
</html>
